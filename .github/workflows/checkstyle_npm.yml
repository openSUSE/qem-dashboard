---
name: checkstyle (NPM)
# yamllint disable-line rule:truthy
on: [push, pull_request]
jobs:
  checkstyle-npm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        fetch-depth: 0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '22'
    - name: Install JS dependencies
      run: make install-deps-js
    - name: Install gitlint
      run: pip install gitlint
    - name: Run checkstyle
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          make checkstyle-npm COMMIT_ARGS="--commits origin/${{ github.base_ref }}..HEAD --verbose"
        else
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "$BEFORE" == "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" >/dev/null 2>&1; then
            make checkstyle-npm COMMIT_ARGS="--verbose"
          else
            make checkstyle-npm COMMIT_ARGS="--commits $BEFORE..$AFTER --verbose"
          fi
        fi
